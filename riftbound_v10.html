<script>
var firebaseConfig = {
  apiKey: "AIzaSyAf5IPeHKuG-mVjcwNElgqVyi7FJsRKMSs",
  authDomain: "rift-nexus.firebaseapp.com",
  databaseURL: "https://rift-nexus-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rift-nexus",
  storageBucket: "rift-nexus.firebasestorage.app",
  messagingSenderId: "77515076670",
  appId: "1:77515076670:web:ef053e88b72d0c73fb4d6f"
};
var fbApp = firebase.initializeApp(firebaseConfig);
var fbDb = firebase.database();
var fbAuth = firebase.auth();
var _guestUid = localStorage.getItem("riftNexusUid") || "p_" + Math.random().toString(36).substr(2, 9);
localStorage.setItem("riftNexusUid", _guestUid);
var myUid = _guestUid;
var myName = localStorage.getItem("riftNexusName") || "";
var _authReady = false;
var _onAuthChange = null;

function signUpEmail(email, password, displayName, cb, errCb) {
  fbAuth.createUserWithEmailAndPassword(email, password).then(function(cred) {
    return cred.user.updateProfile({ displayName: displayName }).then(function() {
      fbDb.ref("users/" + cred.user.uid).set({ name: displayName, email: email, createdAt: Date.now(), lastSeen: Date.now(), gamesPlayed: 0, gamesWon: 0 });
      if (cb) cb(cred.user);
    });
  }).catch(function(err) { if (errCb) errCb(err.message); });
}

function signInEmail(email, password, cb, errCb) {
  fbAuth.signInWithEmailAndPassword(email, password).then(function(cred) {
    fbDb.ref("users/" + cred.user.uid + "/lastSeen").set(Date.now());
    if (cb) cb(cred.user);
  }).catch(function(err) { if (errCb) errCb(err.message); });
}

function signInGoogle(cb, errCb) {
  var provider = new firebase.auth.GoogleAuthProvider();
  fbAuth.signInWithPopup(provider).then(function(result) {
    var user = result.user;
    fbDb.ref("users/" + user.uid).once("value", function(snap) {
      if (!snap.val()) {
        fbDb.ref("users/" + user.uid).set({ name: user.displayName || "", email: user.email || "", createdAt: Date.now(), lastSeen: Date.now(), gamesPlayed: 0, gamesWon: 0 });
      } else {
        fbDb.ref("users/" + user.uid + "/lastSeen").set(Date.now());
      }
    });
    if (cb) cb(user);
  }).catch(function(err) { if (errCb) errCb(err.message); });
}

function signOutUser(cb) {
  fbAuth.signOut().then(function() {
    myUid = _guestUid;
    myName = localStorage.getItem("riftNexusName") || "";
    if (cb) cb();
  });
}

fbAuth.onAuthStateChanged(function(user) {
  if (user) {
    myUid = user.uid;
    myName = user.displayName || localStorage.getItem("riftNexusName") || "";
  } else {
    myUid = _guestUid;
    myName = localStorage.getItem("riftNexusName") || "";
  }
  _authReady = true;
  if (_onAuthChange) _onAuthChange(user);
});

function genRoomCode() { var chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; var code = ""; for (var i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)]; return code; }

var _currentLobbyCode = null;
function createLobby(mode, password, cb) {
  // Clean up any previous lobby
  if (_currentLobbyCode) { fbDb.ref("lobbies/" + _currentLobbyCode).remove(); _currentLobbyCode = null; }
  var code = genRoomCode();
  var lobby = {
    host: { uid: myUid, name: myName },
    settings: { mode: mode.name, pc: mode.pc, password: password || null, status: "waiting", createdAt: Date.now() },
    players: {}
  };
  lobby.players[myUid] = { name: myName, deck: null, ready: false, slot: 0 };
  fbDb.ref("lobbies/" + code).set(lobby, function(err) {
    if (!err) {
      _currentLobbyCode = code;
      // Auto-remove player on disconnect
      fbDb.ref("lobbies/" + code + "/players/" + myUid).onDisconnect().remove();
      if (cb) cb(code);
    }
  });
}

function joinLobby(code, password, cb, errCb) {
  fbDb.ref("lobbies/" + code).once("value", function(snap) {
    var lobby = snap.val();
    if (!lobby) { if (errCb) errCb("Lobby not found"); return; }
    if (lobby.settings.status !== "waiting") { if (errCb) errCb("Game already started"); return; }
    if (lobby.settings.password && lobby.settings.password !== password) { if (errCb) errCb("Wrong password"); return; }
    var playerCount = Object.keys(lobby.players || {}).length;
    if (playerCount >= lobby.settings.pc) { if (errCb) errCb("Lobby full"); return; }
    var playerData = { name: myName, deck: null, ready: false, slot: playerCount };
    fbDb.ref("lobbies/" + code + "/players/" + myUid).set(playerData, function(err) {
      if (!err) {
        _currentLobbyCode = code;
        fbDb.ref("lobbies/" + code + "/players/" + myUid).onDisconnect().remove();
        if (cb) cb(code, lobby);
      }
    });
  });
}

function purgeAllLobbies() { fbDb.ref("lobbies").remove(); }
function listLobbies(cb) {
  fbDb.ref("lobbies").orderByChild("settings/status").equalTo("waiting").once("value", function(snap) {
    var lobbies = [];
    snap.forEach(function(child) {
      var d = child.val();
      var playerCount = d.players ? Object.keys(d.players).length : 0;
      if (playerCount === 0) { fbDb.ref("lobbies/" + child.key).remove(); return; }
      // Clean up stale lobbies older than 2 hours
      if (d.settings && d.settings.createdAt && Date.now() - d.settings.createdAt > 7200000) { fbDb.ref("lobbies/" + child.key).remove(); return; }
      lobbies.push({ code: child.key, data: d });
    });
    if (cb) cb(lobbies);
  });
}

function writeLobbyGameState(code, state) {
  fbDb.ref("lobbies/" + code + "/gameState").set(state);
}

function writeGameAction(code, state) {
  fbDb.ref("lobbies/" + code + "/gameState").set(state);
}

                  return <div style={{ width: 235, padding: "4px 0", flexShrink: 0, textAlign: "center", marginBottom: 3 }}><div style={{ padding: "4px 8px", borderRadius: 5, border: "1.5px solid " + (showcaseAccepted ? "#4ADE80" : "#ff4444"), background: showcaseAccepted ? "rgba(74,222,128,0.12)" : "rgba(255,68,68,0.12)", color: showcaseAccepted ? "#4ADE80" : "#ff6666", fontSize: 11, fontFamily: "Cinzel,serif", fontWeight: 700, boxShadow: showcaseAccepted ? "0 0 10px rgba(74,222,128,0.3)" : "0 0 10px rgba(255,68,68,0.3)" }}>{showcaseAccepted ? otherName + " accepted" : otherName + " has not accepted"}</div></div>;
                } else {
                  return <div style={{ width: 235, padding: "4px 0", flexShrink: 0, textAlign: "center", marginBottom: 3 }}><button onClick={function() { setShowcaseAccepted(!showcaseAccepted); }} style={{ width: "100%", padding: "4px 8px", borderRadius: 5, border: "1.5px solid " + (showcaseAccepted ? "#4ADE80" : "#FFD700"), background: showcaseAccepted ? "rgba(74,222,128,0.12)" : "rgba(255,215,0,0.12)", color: showcaseAccepted ? "#4ADE80" : "#FFD700", fontSize: 11, fontFamily: "Cinzel,serif", fontWeight: 700, cursor: "pointer", boxShadow: showcaseAccepted ? "0 0 10px rgba(74,222,128,0.3)" : "0 0 10px rgba(255,215,0,0.3)" }}>{showcaseAccepted ? "Accepted ✓" : "Accept - no more responses"}</button></div>;
                }
              })()}
              <div data-uid={showcaseCard.uid} onClick={function() { if (!drawingArrow) { if (showcaseHistory.length > 0) { setShowcaseCard(showcaseHistory[0]); setShowcaseHistory(function(prev) { return prev.slice(1); }); } else { setShowcaseCard(null); setShowcaseOwner(null); setShowcaseAccepted(false); } } }} style={{ position: "relative", flex: 1, display: "flex", alignItems: "center", justifyContent: "center", cursor: drawingArrow ? "crosshair" : "pointer" }}>
                {showcaseCard.img ? <img src={imgSrc(showcaseCard.img)} onError={function(e) { if (PA[showcaseCard.name] && e.target.src.indexOf("piltover") < 0) { e.target.src = PA_CDN + PA[showcaseCard.name] + ".webp"; } }} style={{ width: 235, height: 329, objectFit: "fill", display: "block", borderRadius: 6 }} /> : <div style={{ width: 235, height: 329, display: "flex", alignItems: "center", justifyContent: "center", color: "#FFD700", fontSize: 14, fontFamily: "Cinzel,serif", borderRadius: 6, border: "1px solid #ffffff20", textAlign: "center", padding: 8 }}>{showcaseCard.name}</div>}
                {showcaseCard.counter2 !== 0 && showcaseCard.counter2 !== undefined && <div style={{ position: "absolute", top: -8, right: -8, background: "#854d0e", color: "#FACC15", borderRadius: 12, minWidth: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 900, boxShadow: "0 2px 6px #000a", padding: "0 4px" }}>{showcaseCard.counter2 > 0 ? "+" : ""}{showcaseCard.counter2}</div>}
                {showcaseCard.counter !== 0 && showcaseCard.counter !== undefined && <div style={{ position: "absolute", top: -8, right: showcaseCard.counter2 ? 30 : -8, background: "#166534", color: "#4ADE80", borderRadius: 12, minWidth: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 900, boxShadow: "0 2px 6px #000a", padding: "0 4px" }}>{showcaseCard.counter > 0 ? "+" : ""}{showcaseCard.counter}</div>}
                <button onClick={function(e) { e.stopPropagation(); sendToBin(showcaseCard.uid); if (showcaseHistory.length > 0) { setShowcaseCard(showcaseHistory[0]); setShowcaseHistory(function(prev) { return prev.slice(1); }); } else { setShowcaseCard(null); setShowcaseOwner(null); setShowcaseAccepted(false); } }} style={{ position: "absolute", bottom: -8, left: -8, width: 26, height: 26, borderRadius: "50%", border: "1.5px solid #cc555588", background: "rgba(160,40,40,0.75)", color: "#ffaaaa", fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}>🗑</button>
                <button onClick={function(e) { e.stopPropagation(); startArrow(showcaseCard.uid); }} style={{ position: "absolute", top: -8, left: -8, width: 26, height: 26, borderRadius: "50%", border: "1.5px solid #3B82F688", background: "rgba(59,130,246,0.75)", color: "#fff", fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0 }}>↗</button>
                {cardHasArrow(showcaseCard.uid) && <button onClick={function(e) { e.stopPropagation(); removeArrow(showcaseCard.uid); }} style={{ position: "absolute", top: -8, left: 22, width: 26, height: 26, borderRadius: "50%", border: "1.5px solid #cc555588", background: "rgba(200,40,40,0.85)", color: "#fff", fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0, fontWeight: 900 }}>✕</button>}
              </div>
            </>) : (
              <div style={{ width: 235, height: 329, border: "1px dashed #ffffff20", borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", color: "#ffffff30", fontSize: 10, fontFamily: "Cinzel,serif" }}>Drag a card</div>
            )}
          </div>
          {/* Showcase history sub-banner */}
          {showcaseHistory.length > 0 && <div style={{ flexShrink: 0, display: "flex", gap: 3, padding: "3px 4px", alignItems: "center", justifyContent: "center", flexWrap: "wrap", borderTop: "1px solid #ffffff10" }}>
            <div style={{ fontSize: 8, color: "#ffffff30", fontFamily: "Cinzel,serif", width: "100%", textAlign: "center", marginBottom: 1 }}>CHAIN</div>
            {showcaseHistory.map(function(hc, hi) {
              return <div key={hc.uid + "-" + hi} data-uid={hc.uid} onClick={function() { setShowcaseHistory(function(prev) { return prev.filter(function(_, i) { return i !== hi; }); }); }} style={{ width: 50, height: 70, borderRadius: 4, overflow: "hidden", border: "1.5px solid #FFD70030", cursor: "pointer", flexShrink: 0, position: "relative" }}>
                {hc.img ? <img src={imgSrc(hc.img)} style={{ width: "100%", height: "100%", objectFit: "fill" }} /> : <div style={{ width: "100%", height: "100%", background: "#151530", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 6, color: "#FFD700", padding: 1, textAlign: "center" }}>{hc.name}</div>}
              </div>;
            })}
          </div>}
          {/* Chat zone */}
          <div style={{ flexShrink: 0, height: 200, display: "flex", flexDirection: "column", borderTop: "1px solid #ffffff15", padding: "4px 4px 4px" }}>
            <div style={{ fontSize: 9, color: "#ffffff44", fontFamily: "Cinzel,serif", letterSpacing: 1, marginBottom: 2, textAlign: "center" }}>CHAT</div>
            <div ref={chatRef} style={{ flex: 1, overflow: "auto", fontSize: 10, lineHeight: 1.4, padding: "2px 4px" }}>
              {chatMsgs.length === 0 && <div style={{ color: "#ffffff15", fontSize: 9, fontFamily: "Cinzel,serif", textAlign: "center", marginTop: 8 }}>{roomCode ? "No messages yet" : "Chat available in online games"}</div>}
              {chatMsgs.map(function(m, i) { var isMe = m.uid === myUid; return <div key={i} style={{ marginBottom: 2 }}><span style={{ color: isMe ? "#4ADE80" : "#FFD700", fontWeight: 700, fontSize: 9 }}>{m.name}: </span><span style={{ color: "#bbb" }}>{m.text}</span></div>; })}
            </div>
            {roomCode && lobbyType !== "test" && <div style={{ display: "flex", gap: 3, marginTop: 3 }}>
              <input value={chatInput} onChange={function(e) { setChatInput(e.target.value); }} onKeyDown={function(e) { if (e.key === "Enter") sendChat(); }} placeholder="Type a message..." style={{ flex: 1, padding: "4px 6px", borderRadius: 4, border: "1px solid #ffffff15", background: "rgba(255,255,255,0.05)", color: "#ddd", fontSize: 10, outline: "none", fontFamily: "Inter,sans-serif" }} />
              <button onClick={sendChat} style={{ padding: "4px 8px", borderRadius: 4, border: "1px solid #FFD70033", background: "rgba(255,215,0,0.1)", color: "#FFD700", cursor: "pointer", fontSize: 9, fontWeight: 700, fontFamily: "Cinzel,serif" }}>Send</button>
            </div>}
          </div>
        </div>
      </div>
      {/* Ping effects */}
      {pings.map(function(p) { var el = document.querySelector("[data-uid='" + p.cardUid + "']"); if (!el) return null; var r = el.getBoundingClientRect(); return <div key={p.id} className="ping-dot" style={{ left: r.left + r.width / 2, top: r.top + r.height / 2 }} />; })}
      {/* Arrow SVG overlay */}
      {(drawingArrow || arrows.length > 0 || (showcaseCard && showcaseHistory.length > 0)) && (function() {
        var vw2 = typeof window !== "undefined" ? window.innerWidth : 1920;
        var vh2 = typeof window !== "undefined" ? window.innerHeight : 1080;
        function getCardCenter(cardUid) {
          var el = document.querySelector("[data-uid='" + cardUid + "']");
          if (!el) return null;
          var r = el.getBoundingClientRect();
          return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
        }
        function makePath(x1, y1, x2, y2) {
          var dx = x2 - x1; var dy = y2 - y1;
          var cx = (x1 + x2) / 2 + dy * 0.2;
          var cy = (y1 + y2) / 2 - dx * 0.2;
          return "M " + x1 + " " + y1 + " Q " + cx + " " + cy + " " + x2 + " " + y2;
        }
        var paths = [];
        // Persisted arrows
        arrows.forEach(function(a) {
          var from = getCardCenter(a.fromUid);
          var to = getCardCenter(a.toUid);
          if (from && to) paths.push({ d: makePath(from.x, from.y, to.x, to.y), key: a.id });
        });
        // Showcase chain arrows — each card arrows to the next in the chain
        var scChainPaths = [];
        if (showcaseCard && showcaseHistory.length > 0) {
          var chainAll = [showcaseCard].concat(showcaseHistory);
          for (var ci = 0; ci < chainAll.length - 1; ci++) {
            var cFrom = getCardCenter(chainAll[ci].uid);
            var cTo = getCardCenter(chainAll[ci + 1].uid);
            if (cFrom && cTo) scChainPaths.push({ d: makePath(cFrom.x, cFrom.y, cTo.x, cTo.y), key: "sc-chain-" + ci });
          }
        }
        // Drawing arrow
        var drawPath = null;
        if (drawingArrow && drawingArrow.x > 0) {
          var from2 = getCardCenter(drawingArrow.fromUid);
          if (from2) drawPath = makePath(from2.x, from2.y, drawingArrow.x, drawingArrow.y);
        }
        return <svg style={{ position: "fixed", inset: 0, width: vw2, height: vh2, pointerEvents: "none", zIndex: 9998 }}>
          <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8" fill="#3B82F6" /></marker>
            <marker id="arrowhead-draw" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8" fill="#3B82F6" opacity="0.6" /></marker>
            <marker id="arrowhead-chain" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8" fill="#FFD700" /></marker>
          </defs>
          {paths.map(function(p) { return <path key={p.key} d={p.d} fill="none" stroke="#3B82F6" strokeWidth="4" markerEnd="url(#arrowhead)" strokeLinecap="round" />; })}
          {scChainPaths.map(function(p) { return <path key={p.key} d={p.d} fill="none" stroke="#FFD700" strokeWidth="3" markerEnd="url(#arrowhead-chain)" strokeLinecap="round" opacity="0.8" />; })}
          {drawPath && <path d={drawPath} fill="none" stroke="#3B82F6" strokeWidth="3" strokeDasharray="8 5" markerEnd="url(#arrowhead-draw)" strokeLinecap="round" opacity="0.7" />}
        </svg>;
      })()}
      {/* Floating hover tooltip */}
      {hoverCard && hoverCard.card && (function() {
        var hc = hoverCard.card;
        var tw = 270; var th = 378;
        var vw = typeof window !== "undefined" ? window.innerWidth : 1920;
        var vh = typeof window !== "undefined" ? window.innerHeight : 1080;
        var onLeft = hoverCard.cx > vw / 2;
        var tx = onLeft ? hoverCard.left - tw - 20 : hoverCard.right + 20;
        var ty = Math.max(8, Math.min(hoverCard.cy - th / 2, vh - th - 8));
        if (hc._isBf) {
          var bfIsLand = hc._isLandscape;
          var bfContW = th; var bfContH = tw;
          var onLeftBf = hoverCard.cx > vw / 2;
          var bfTx = onLeftBf ? hoverCard.left - bfContW - 20 : hoverCard.right + 20;
          var bfTy = Math.max(8, Math.min(hoverCard.cy - bfContH / 2, vh - bfContH - 8));
          if (bfTx < 4) bfTx = 4; if (bfTx + bfContW > vw - 4) bfTx = vw - bfContW - 4;
          return <div style={{ position: "fixed", left: bfTx, top: bfTy, zIndex: 9999, pointerEvents: "none" }}>
            <div style={{ width: bfContW, height: bfContH, display: "flex", justifyContent: "center", alignItems: "center" }}>
              {hc._bfUrl ? <img src={hc._bfUrl} style={bfIsLand ? { width: bfContW, height: bfContH, objectFit: "fill", display: "block", borderRadius: 6, border: "1px solid #ffffff25", boxShadow: "0 8px 32px #000c" } : { width: tw, height: th, objectFit: "fill", display: "block", borderRadius: 6, border: "1px solid #ffffff25", transform: "rotate(90deg)", boxShadow: "0 8px 32px #000c" }} /> : <div style={{ width: tw, height: th, display: "flex", alignItems: "center", justifyContent: "center", color: "#FFD700", fontSize: 16, fontFamily: "Cinzel,serif", borderRadius: 6, border: "1px solid #ffffff25", transform: bfIsLand ? "none" : "rotate(90deg)", background: "#0c0c18" }}>{hc.name}</div>}
            </div>
          </div>;
        }
        if (tx < 4) tx = 4; if (tx + tw > vw - 4) tx = vw - tw - 4;
        return <div style={{ position: "fixed", left: tx, top: ty, zIndex: 9999, pointerEvents: "none" }}>
          <div style={{ position: "relative" }}>
            {hc.img ? <img src={imgSrc(hc.img)} onError={function(e) { if (PA[hc.name] && e.target.src.indexOf("piltover") < 0) { e.target.src = PA_CDN + PA[hc.name] + ".webp"; } }} style={{ width: tw, height: th, objectFit: "fill", display: "block", borderRadius: 6, border: "1px solid #ffffff25", boxShadow: "0 8px 32px #000c" }} /> : <div style={{ width: tw, height: th, display: "flex", alignItems: "center", justifyContent: "center", color: "#FFD700", fontSize: 16, fontFamily: "Cinzel,serif", padding: 12, textAlign: "center", borderRadius: 6, border: "1px solid #ffffff25", background: "#0c0c18", boxShadow: "0 8px 32px #000c" }}>{hc.name}</div>}
            {hc.counter2 !== 0 && hc.counter2 !== undefined && <div style={{ position: "absolute", top: -8, right: -8, background: "#854d0e", color: "#FACC15", borderRadius: 12, minWidth: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 900, boxShadow: "0 2px 6px #000a", padding: "0 4px" }}>{hc.counter2 > 0 ? "+" : ""}{hc.counter2}</div>}
            {hc.counter !== 0 && hc.counter !== undefined && <div style={{ position: "absolute", top: -8, right: hc.counter2 ? 30 : -8, background: "#166534", color: "#4ADE80", borderRadius: 12, minWidth: 24, height: 24, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 900, boxShadow: "0 2px 6px #000a", padding: "0 4px" }}>{hc.counter > 0 ? "+" : ""}{hc.counter}</div>}
          </div>
        </div>;
      })()}
    </div>
  );

}
ReactDOM.render(React.createElement(RiftboundGame),document.getElementById("root"));
</script></body></html>
